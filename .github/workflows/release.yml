name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix builds
        uses: DeterminateSystems/magic-nix-cache-action@v12

      - name: Verify release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(awk -F ' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"

          if [ "$version" != "$cargo_version" ]; then
            echo "tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "crate=qualisys_rust_sdk"
            echo "crate_file=target/package/qualisys_rust_sdk-$version.crate"
          } >> "$GITHUB_OUTPUT"

      - name: Run checks
        run: nix flake check --print-build-logs

      - name: Package crate
        shell: bash
        run: |
          set -euo pipefail
          nix develop --command cargo package --locked
          test -f "${{ steps.version.outputs.crate_file }}"
          sha256sum "${{ steps.version.outputs.crate_file }}" > "${{ steps.version.outputs.crate_file }}.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          files=(
            "${{ steps.version.outputs.crate_file }}"
            "${{ steps.version.outputs.crate_file }}.sha256"
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "$GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME"
          fi

      - name: Check crates.io
        id: published
        shell: bash
        run: |
          set -euo pipefail

          user_agent="CogniPilot/qualisys_rust_sdk release workflow"
          if curl --fail --silent --show-error --user-agent "$user_agent" \
            "https://crates.io/api/v1/crates/${{ steps.version.outputs.crate }}/${{ steps.version.outputs.version }}" >/dev/null; then
            published=true
          else
            published=false
          fi

          echo "published=$published" >> "$GITHUB_OUTPUT"
          echo "published=$published"

      - name: Publish to crates.io
        if: steps.published.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "missing CARGO_REGISTRY_TOKEN repository secret" >&2
            exit 1
          fi

          nix develop --command cargo publish --locked
